<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizers - Admin Dashboard | MyTUT Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "tut-blue": "#0A2463",
                        "tut-red": "#990000",
                        "tut-yellow": "#E6A817",
                        "tut-green": "#10B981",
                    },
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                },
            },
        };
    </script>
    <style>
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s;
        }

        .toast.success {
            background: #10B981;
        }

        .toast.error {
            background: #EF4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex">
    <!-- Sidebar (same as admin dashboard) -->
    <div class="w-64 bg-tut-blue text-white min-h-screen hidden md:block">
        <div class="p-6 border-b border-blue-800">
            <div class="flex items-center">
                <img src="{{ url_for('static', filename='images/favicon.ico') }}" alt="Logo" class="h-8 w-8 mr-3">
                <span class="text-xl font-bold">MyTUT<span class="text-tut-yellow">Events</span></span>
            </div>
            <p class="text-sm text-blue-300 mt-2">Admin Dashboard</p>
        </div>
        <nav class="mt-6">
            <ul class="space-y-2 px-4">
                <li><a href="{{ url_for('admin_dashboard') }}"
                        class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-700 transition"><i
                            class="fas fa-home mr-3 w-5"></i>Dashboard</a></li>
                <li><a href="#" class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-700 transition"><i
                            class="fas fa-calendar-alt mr-3 w-5"></i>Events</a></li>
                <li><a href="{{ url_for('admin_organizers') }}"
                        class="flex items-center px-4 py-3 bg-blue-800/50 border-l-4 border-tut-yellow"><i
                            class="fas fa-user-cog mr-3 w-5"></i>Organizers</a></li>
                <li><a href="{{ url_for('admin_students') }}"
                        class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-700 transition"><i
                            class="fas fa-user-graduate mr-3 w-5"></i>Students</a></li>
                <li><a href="{{ url_for('admin_attendees') }}"
                        class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-700 transition"><i
                            class="fas fa-users mr-3 w-5"></i>Attendees</a></li>
                <li><a href="{{ url_for('admin_analytics') }}"
                        class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-700 transition"><i
                            class="fas fa-chart-bar mr-3 w-5"></i>Analytics</a></li>
                <li class="pt-6"><a href="{{ url_for('admin_logout') }}"
                        class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-700 transition"><i
                            class="fas fa-sign-out-alt mr-3 w-5"></i>Logout</a></li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center">
            <button class="md:hidden text-gray-600"><i class="fas fa-bars"></i></button>
            <h1 class="text-xl font-semibold">Organizer Management</h1>
            <div class="flex items-center space-x-4">
                <i class="fas fa-bell text-gray-600"></i>
                <div class="w-8 h-8 bg-tut-blue rounded-full flex items-center justify-center text-white font-bold">{{
                    admin_name[:2]|upper }}</div>
            </div>
        </header>

        <main class="p-6 overflow-y-auto">
            <div class="bg-white rounded-xl shadow p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold">All Organizers</h2>
                    <button onclick="showOrganizerModal()"
                        class="bg-tut-green text-white px-4 py-2 rounded-lg text-sm hover:bg-emerald-600">
                        <i class="fas fa-plus mr-1"></i> Add Organizer
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-sm text-gray-600 border-b">
                                <th class="pb-3">ID</th>
                                <th class="pb-3">Name</th>
                                <th class="pb-3">Email</th>
                                <th class="pb-3">Phone</th>
                                <th class="pb-3">Department</th>
                                <th class="pb-3">Events Organized</th>
                                <th class="pb-3">Status</th>
                                <th class="pb-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="organizersTableBody" class="divide-y divide-gray-200">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Organizer Modal (same as before) -->
    <div id="organizerModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 id="organizerModalTitle" class="text-lg font-semibold">Add Organizer</h2>
                <button onclick="closeOrganizerModal()" class="text-gray-500"><i class="fas fa-times"></i></button>
            </div>
            <form id="organizerForm" class="space-y-4">
                <input type="hidden" id="organizerId" name="organizer_id">
                <div><label class="block text-sm font-medium mb-1">Name</label><input type="text" name="name"
                        id="organizerName" class="w-full p-2 border rounded" required></div>
                <div><label class="block text-sm font-medium mb-1">Email</label><input type="email" name="email"
                        id="organizerEmail" class="w-full p-2 border rounded" required></div>
                <div><label class="block text-sm font-medium mb-1">Phone</label><input type="text" name="phone"
                        id="organizerPhone" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-medium mb-1">Department</label><input type="text"
                        name="department" id="organizerDepartment" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-medium mb-1">Password</label><input type="password"
                        name="password" id="organizerPassword" class="w-full p-2 border rounded"
                        placeholder="Leave blank to keep current"></div>
                <div><label class="block text-sm font-medium mb-1">Status</label>
                    <select name="status" id="organizerStatus" class="w-full p-2 border rounded">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="closeOrganizerModal()"
                        class="px-4 py-2 bg-gray-200 rounded">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-tut-blue text-white rounded">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Load organizers
        async function loadOrganizers() {
            try {
                const res = await fetch('/admin/organizers');
                const data = await res.json();
                const tbody = document.getElementById('organizersTableBody');
                tbody.innerHTML = '';
                data.forEach(org => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="py-3">${org.organizer_id}</td>
                            <td class="py-3">${org.name}</td>
                            <td class="py-3">${org.email}</td>
                            <td class="py-3">${org.phone || '-'}</td>
                            <td class="py-3">${org.department || '-'}</td>
                            <td class="py-3">${org.events_organized || 0}</td>
                            <td class="py-3"><span class="px-2 py-1 text-xs rounded-full ${org.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-600'}">${org.status}</span></td>
                            <td class="py-3">
                                <button onclick="editOrganizer(${org.organizer_id})" class="text-tut-blue text-sm hover:underline mr-2"><i class="fas fa-edit"></i> Edit</button>
                                <button onclick="deleteOrganizer(${org.organizer_id})" class="text-tut-red text-sm hover:underline"><i class="fas fa-trash"></i> Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { showToast('Error loading organizers', 'error'); }
        }

        function showOrganizerModal() {
            document.getElementById('organizerModalTitle').innerText = 'Add Organizer';
            document.getElementById('organizerForm').reset();
            document.getElementById('organizerId').value = '';
            document.getElementById('organizerPassword').required = true;
            document.getElementById('organizerModal').classList.add('show');
        }

        function closeOrganizerModal() {
            document.getElementById('organizerModal').classList.remove('show');
        }

        async function editOrganizer(id) {
            try {
                const res = await fetch(`/admin/organizers/${id}`);
                const org = await res.json();
                document.getElementById('organizerModalTitle').innerText = 'Edit Organizer';
                document.getElementById('organizerId').value = org.organizer_id;
                document.getElementById('organizerName').value = org.name;
                document.getElementById('organizerEmail').value = org.email;
                document.getElementById('organizerPhone').value = org.phone || '';
                document.getElementById('organizerDepartment').value = org.department || '';
                document.getElementById('organizerStatus').value = org.status;
                document.getElementById('organizerPassword').required = false;
                document.getElementById('organizerModal').classList.add('show');
            } catch (err) { showToast('Error loading organizer', 'error'); }
        }

        document.getElementById('organizerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const id = formData.get('organizer_id');
            const url = id ? `/admin/organizers/${id}` : '/admin/organizers';
            const method = id ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, { method, body: formData });
                const result = await res.json();
                if (result.success) {
                    showToast(result.message, 'success');
                    closeOrganizerModal();
                    loadOrganizers();
                } else { showToast(result.message, 'error'); }
            } catch (err) { showToast('Error saving organizer', 'error'); }
        });

        async function deleteOrganizer(id) {
            if (!confirm('Delete this organizer?')) return;
            try {
                const res = await fetch(`/admin/organizers/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    showToast(result.message, 'success');
                    loadOrganizers();
                } else { showToast(result.message, 'error'); }
            } catch (err) { showToast('Error deleting organizer', 'error'); }
        }

        document.addEventListener('DOMContentLoaded', loadOrganizers);
    </script>
</body>

</html>
